name: Build desktop installers

# Runs whenever desktop-app changes land on master (either computer, any
# push), plus a manual trigger for rebuilding on demand without needing a
# new commit. Each platform must build on that platform's own runner --
# electron-builder can't cross-compile a .dmg on Linux/Windows or a
# working .exe on macOS.
on:
  push:
    branches: [master]
    paths:
      - 'desktop-app/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run dist:mac
      - name: Upload to release, replacing any older mac asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # GitHub replaces spaces with periods in the stored asset name on
          # upload, regardless of the local filename -- comparing against
          # the un-sanitized local name here previously caused the loop to
          # treat the file it had JUST uploaded as "old" and delete it.
          NEW_ASSET=$(basename dist/*.dmg | tr ' ' '.')
          gh release upload v1 dist/*.dmg --repo "$GITHUB_REPOSITORY" --clobber
          for old in $(gh release view v1 --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | grep '\.dmg$' || true); do
            if [ "$old" != "$NEW_ASSET" ]; then
              gh release delete-asset v1 "$old" --repo "$GITHUB_REPOSITORY" --yes
            fi
          done
      - name: Archive this version privately, keep last 5
        env:
          GH_TOKEN: ${{ secrets.ARCHIVE_REPO_TOKEN }}
          ARCHIVE_REPO: andreasserfilippi/clipbridge-builds
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          TAG="mac-$VERSION"
          gh release create "$TAG" dist/*.dmg --repo "$ARCHIVE_REPO" --title "Mac $VERSION" --notes "Archived build. Not for distribution." \
            || gh release upload "$TAG" dist/*.dmg --repo "$ARCHIVE_REPO" --clobber
          i=0
          for t in $(gh release list --repo "$ARCHIVE_REPO" --json tagName,createdAt -q 'sort_by(.createdAt) | reverse | .[].tagName' | grep '^mac-' || true); do
            i=$((i + 1))
            if [ "$i" -gt 5 ]; then
              gh release delete "$t" --repo "$ARCHIVE_REPO" --yes --cleanup-tag
            fi
          done

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run dist:win
      - name: Upload to release, replacing any older windows asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # electron-builder's default NSIS name has spaces ("ClipBridge
          # Setup 1.0.3.exe"), but GitHub replaces spaces with periods in
          # the stored asset name on upload -- comparing against the
          # un-sanitized local name here previously caused the loop to
          # treat the file it had JUST uploaded as "old" and delete it,
          # leaving zero windows assets on the release.
          NEW_ASSET=$(basename dist/*.exe | tr ' ' '.')
          gh release upload v1 dist/*.exe --repo "$GITHUB_REPOSITORY" --clobber
          for old in $(gh release view v1 --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | grep '\.exe$' || true); do
            if [ "$old" != "$NEW_ASSET" ]; then
              gh release delete-asset v1 "$old" --repo "$GITHUB_REPOSITORY" --yes
            fi
          done
      - name: Archive this version privately, keep last 5
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ARCHIVE_REPO_TOKEN }}
          ARCHIVE_REPO: andreasserfilippi/clipbridge-builds
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          TAG="win-$VERSION"
          gh release create "$TAG" dist/*.exe --repo "$ARCHIVE_REPO" --title "Windows $VERSION" --notes "Archived build. Not for distribution." \
            || gh release upload "$TAG" dist/*.exe --repo "$ARCHIVE_REPO" --clobber
          i=0
          for t in $(gh release list --repo "$ARCHIVE_REPO" --json tagName,createdAt -q 'sort_by(.createdAt) | reverse | .[].tagName' | grep '^win-' || true); do
            i=$((i + 1))
            if [ "$i" -gt 5 ]; then
              gh release delete "$t" --repo "$ARCHIVE_REPO" --yes --cleanup-tag
            fi
          done
